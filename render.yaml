# Render Blueprint — https://render.com/docs/blueprint-spec
# If the YAML import errors, create the Web Service manually in the dashboard instead.
services:
  - type: web
    name: sync-work-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Set in dashboard: DATABASE_URL (Neon), JWT_SECRET, CLIENT_ORIGIN
